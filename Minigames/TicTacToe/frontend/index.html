<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adivina El Numero</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <button class="back-btn" onclick="goBackToGameHub()">← Volver al GameHub</button>
    <script>
      function goBackToGameHub() {
        // Método más simple y confiable: usar el historial del navegador
        if (window.history.length > 1) {
          window.history.back();
        } else {
          // Si no hay historial, intenta navegación alternativa
          let currentPath = window.location.href;
          if (currentPath.includes('/Minigames/')) {
            // Encuentra la posición de GameHub y navega hacia el index.html
            let baseIndex = currentPath.indexOf('/GameHub/');
            if (baseIndex !== -1) {
              window.location.href = currentPath.substring(0, baseIndex + 9) + 'index.html';
            }
          }
        }
      }
    </script>
  <center>
  <header id="main-header">
      <div class="banner">
        <h1>Tic Tac Toe</h1>
      </div>
  </header>

  <main>
    <section class="contenedor">
      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; font-size: 5rem;">
        <div id="btn-1" style="aspect-ratio: 1; background: #fff; transition: all 0.2s; cursor: pointer;"></div>
        <div id="btn-2" style="aspect-ratio: 1; background: #fff; transition: all 0.2s; cursor: pointer;"></div>
        <div id="btn-3" style="aspect-ratio: 1; background: #fff; transition: all 0.2s; cursor: pointer;"></div>
        <div id="btn-4" style="aspect-ratio: 1; background: #fff; transition: all 0.2s; cursor: pointer;"></div>
        <div id="btn-5" style="aspect-ratio: 1; background: #fff; transition: all 0.2s; cursor: pointer;"></div>
        <div id="btn-6" style="aspect-ratio: 1; background: #fff; transition: all 0.2s; cursor: pointer;"></div>
        <div id="btn-7" style="aspect-ratio: 1; background: #fff; transition: all 0.2s; cursor: pointer;"></div>
        <div id="btn-8" style="aspect-ratio: 1; background: #fff; transition: all 0.2s; cursor: pointer;"></div>
        <div id="btn-9" style="aspect-ratio: 1; background: #fff; transition: all 0.2s; cursor: pointer;"></div>
      </div>
      <div class="item">
        <button id="reiniciar">Reiniciar</button>
      </div>

  </main>
  </center>
  
  <script src="script.js"></script>
</body>
</html>
